version: "3.9"

services:
  document-agent:
    build: .
    image: document-agent:latest
    container_name: document-agent
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_PORT=5000
      - USE_BEDROCK=false
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./snapshot:/app/snapshot
      - ./inmemory_conversation:/app/inmemory_conversation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
